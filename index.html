<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI - Realtime Edition</title>
    
    <link rel="icon" type="image/png" href="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png">
    <link rel="apple-touch-icon" href="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png">
    <link rel="shortcut icon" href="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Vietlott AI">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Vietlott%20AI%22,%22short_name%22:%22VietlottAI%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22icons%22:[{%22src%22:%22512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Lexend', sans-serif; transition: all 0.5s ease; }
        
        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; background: #0a0a0a; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { width: 140px; height: 140px; object-fit: contain; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }

        /* Themes */
        .dark body { background: #0a0a0a; color: white; }
        .light body { background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%); color: #0369a1; }
        .light .moving-bg { position: fixed; inset: 0; background: url('https://www.transparenttextures.com/patterns/clouds.png'); opacity: 0.4; animation: moveBg 60s linear infinite; z-index: -1; }
        .bronze body { background: linear-gradient(135deg, #cd7f32, #f4a460, #8b4513); background-size: 400% 400%; animation: gradientMove 10s ease infinite; color: #fff; }
        .bronze .moving-bg { position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); animation: pulseShine 4s infinite; z-index: -1; }

        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 1000px 500px; } }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseShine { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }

        .app-container { height: 100%; display: flex; flex-direction: column; padding: var(--safe-top) 1.2rem var(--safe-bottom) 1.2rem; max-width: 500px; margin: 0 auto; z-index: 10; position: relative; }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 6px; }
        .online { background: #22c55e; color: white; }
        .offline { background: #ef4444; color: white; }

        /* Result Box */
        .result-box { flex: 1; margin: 0.8rem 0; border-radius: 2.5rem; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid; backdrop-filter: blur(8px); overflow: hidden; }
        .dark .result-box { background: rgba(255,255,255,0.05); border-color: #FFD700; }
        .light .result-box { background: rgba(255,255,255,0.6); border-color: #0ea5e9; }
        .bronze .result-box { background: rgba(255,255,255,0.2); border-color: #fff; }

        .bg-logo-inner { position: absolute; width: 80%; opacity: 0.15; pointer-events: none; z-index: 0; }

        .ball { width: 3.2rem; height: 3.2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; animation: pop 0.3s forwards; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 1; }
        .dark .ball, .light .ball { background: #FFD700; color: #000; }
        .bronze .ball { background: #fff; color: #8b4513; border-color: #fff; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .btn-main { width: 100%; padding: 1.2rem; border-radius: 1.5rem; font-weight: 900; text-transform: uppercase; border: none; transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
        .dark .btn-main { background: #FFD700; color: #000; }
        .light .btn-main { background: #0ea5e9; color: #fff; }
        .bronze .btn-main { background: #fff; color: #cd7f32; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        select { width: 100%; padding: 0.8rem; border-radius: 1rem; font-weight: 900; -webkit-appearance: none; outline: none; border: 2px solid; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="dark">
    <div id="splash">
        <img src="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png" class="splash-logo">
        <div class="mt-6 font-black text-gold tracking-widest text-sm uppercase">Vietlott AI Loading...</div>
    </div>

    <div class="moving-bg"></div>

    <div class="app-container">
        <header class="py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png" class="w-10 h-10 rounded-lg shadow-lg">
                <div>
                    <div id="connStatus" class="status-pill online">
                        <i id="connIcon" class="fas fa-check-circle"></i>
                        <span id="connText">REALTIME: CONNECTED</span>
                    </div>
                    <h1 class="font-900 text-xl uppercase mt-0.5">Vietlott AI</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="flex items-center px-3 bg-black/20 rounded-xl">
                    <i id="netTypeIcon" class="fas fa-wifi text-gold"></i>
                </div>
                <button onclick="changeTheme()" class="w-12 h-12 bg-gold/20 rounded-xl flex items-center justify-center border-2 border-gold/50">
                    <i id="themeIcon" class="fas fa-moon text-gold"></i>
                </button>
            </div>
        </header>

        <select id="gameSelect" class="mb-2" onchange="syncTitle()">
            <option value="MEGA">MEGA 6/45</option>
            <option value="POWER">POWER 6/55</option>
            <option value="LOTTO">LOTTO 5/35</option>
            <option value="MAX3D">MAX 3D</option>
            <option value="MAX3DPRO">MAX 3D PRO</option>
            <option value="KENO">KENO (20 SỐ)</option>
            <option value="BINGO18">BINGO 18</option>
        </select>

        <div class="result-box" id="resultBox">
            <img src="512x512.4e180c153854dd3721553b2b21d12a05.ai.1.png" class="bg-logo-inner">
            <div id="gameName" class="font-900 text-sm tracking-widest mb-4 opacity-80 uppercase z-10">ĐANG CHỜ KẾT NỐI...</div>
            <div id="ballArea" class="flex flex-wrap justify-center gap-2 p-4 z-10">
                <i class="fas fa-atom fa-spin text-5xl opacity-20"></i>
            </div>
            <p id="statusMsg" class="mt-4 text-[10px] font-black uppercase italic opacity-60 z-10">Sẵn sàng phân tích dữ liệu</p>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4">
            <select id="d"></select><select id="m"></select><select id="y"></select>
        </div>

        <div class="space-y-3 pb-6">
            <button onclick="runPredict('ai')" class="btn-main">AI Phân Tích</button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="runPredict('dob')" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-blue-600 text-white shadow-lg active:scale-95">Theo Ngày Sinh</button>
                <button onclick="runPredict('jackpot')" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-red-600 text-white shadow-lg active:scale-95">Jackpot AI</button>
            </div>
        </div>
    </div>

    <script>
        // Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.visibility = 'hidden', 800);
            }, 2000);
        });

        // Network
        function updateNetworkInfo() {
            const netIcon = document.getElementById('netTypeIcon');
            const connIcon = document.getElementById('connIcon'), connPill = document.getElementById('connStatus'), connText = document.getElementById('connText');
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) netIcon.className = connection.type === 'wifi' || connection.effectiveType.includes('wifi') ? "fas fa-wifi text-gold" : "fas fa-tower-cell text-gold";
            if (navigator.onLine) { connPill.className = "status-pill online"; connIcon.className = "fas fa-check-circle"; connText.innerText = "REALTIME: CONNECTED"; }
            else { connPill.className = "status-pill offline"; connIcon.className = "fas fa-times-circle"; connText.innerText = "REALTIME: DISCONNECTED"; }
        }
        window.addEventListener('online', updateNetworkInfo); window.addEventListener('offline', updateNetworkInfo);

        // Theme
        function changeTheme() {
            const body = document.documentElement, icon = document.getElementById('themeIcon');
            if(body.className === 'dark') { body.className = 'light'; icon.className = 'fas fa-cloud-sun'; }
            else if(body.className === 'light') { body.className = 'bronze'; icon.className = 'fas fa-gem'; }
            else { body.className = 'dark'; icon.className = 'fas fa-moon'; }
        }

        const selD = document.getElementById('d'), selM = document.getElementById('m'), selY = document.getElementById('y');
        for(let i=1;i<=31;i++) selD.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) selM.innerHTML += `<option value="${i}">Tháng ${i}</option>`;
        for(let i=2026;i>=1960;i--) selY.innerHTML += `<option value="${i}">${i}</option>`;

        function syncTitle() { const s = document.getElementById('gameSelect'); document.getElementById('gameName').innerText = s.options[s.selectedIndex].text; }

        // Logic AI
        function runPredict(mode) {
            if(!navigator.onLine) { alert("Không có kết nối mạng!"); return; }
            const area = document.getElementById('ballArea'), status = document.getElementById('statusMsg'), game = document.getElementById('gameSelect').value;
            area.innerHTML = '<div class="w-12 h-12 border-4 border-gold border-t-transparent rounded-full animate-spin"></div>';
            status.innerText = "AI đang quét dữ liệu Vietlott...";
            setTimeout(() => {
                area.innerHTML = '';
                const config = { 'MEGA':[45,6], 'POWER':[55,6], 'LOTTO':[35,5], 'MAX3D':[9,3], 'MAX3DPRO':[9,6], 'KENO':[80,20], 'BINGO18':[6,3] }[game];
                let results = [], seed = mode === 'dob' ? (Number(selD.value) + Number(selM.value) * 31) : Date.now();
                const rng = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
                while(results.length < config[1]) {
                    let n = Math.floor(rng() * (config[0] + (game.includes('MAX') ? 1 : 0))) + (game.includes('MAX') ? 0 : 1);
                    if(game.includes('MAX') || game === 'BINGO18') results.push(n); else if(!results.includes(n)) results.push(n);
                }
                if(!game.includes('MAX') && game !== 'BINGO18') results.sort((a,b) => a-b);
                results.forEach((n, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${game==='KENO'?'w-8 h-8 text-[10px]':'w-12 h-12 text-lg'}`;
                        b.innerText = n < 10 ? '0'+n : n; area.appendChild(b);
                        if(i === results.length - 1) status.innerText = "Kết nối thành công - Đã nhận số!";
                    }, i * 70);
                });
            }, 1200);
        }
        window.onload = () => { syncTitle(); updateNetworkInfo(); };
    </script>
</body>
</html>
