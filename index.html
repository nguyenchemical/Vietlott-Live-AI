<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI Ultimate - Safari Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#FFD700' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        /* FIX TRẮNG/ĐEN TOÀN TẬP TRÊN SAFARI */
        html, body { 
            background-color: #FFFFFF !important; /* Ép mặc định màu trắng */
            color: #1A1A1A !important;
            font-family: 'Lexend', sans-serif;
            height: 100dvh; margin: 0; padding: 0; overflow: hidden;
        }

        .dark html, .dark body { 
            background-color: #000000 !important; 
            color: #FFFFFF !important; 
        }

        /* Nút Vàng - Chữ Đen (High Contrast) */
        .btn-gold {
            background-color: #FFD700 !important;
            color: #000000 !important;
            font-weight: 900;
            border: 2px solid #000000 !important;
            border-radius: 1rem;
            box-shadow: 4px 4px 0px #000 !important;
        }
        .btn-gold:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000 !important; }

        .app-container {
            max-width: 500px; margin: 0 auto; height: 100dvh;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
        }

        .ball {
            width: 3.2rem; height: 3.2rem; background: #FFD700 !important;
            color: #000 !important; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            border: 2px solid #000 !important; animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        /* Khung kết quả rõ ràng */
        .result-box {
            background: #F1F5F9 !important; border: 2px dashed #CBD5E1 !important;
            border-radius: 2rem; min-height: 150px;
        }
        .dark .result-box { background: #18181B !important; border-color: #3F3F46 !important; }
    </style>
</head>
<body class="light">

    <div class="app-container">
        <header class="flex justify-between items-center py-4">
            <h1 class="text-xl font-900 text-[#D32F2F]">VIETLOTT <span class="text-black dark:text-white">AI PRO</span></h1>
            <button onclick="toggleTheme()" class="p-2 bg-gray-100 dark:bg-zinc-800 rounded-lg">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </header>

        <div class="text-center mb-2">
            <span class="text-[10px] font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-200 uppercase">
                <i class="fas fa-signal animate-pulse mr-1"></i> Live: vietlott.vn connected
            </span>
        </div>

        <div class="space-y-4 flex-grow flex flex-col justify-center">
            <select id="game" class="w-full p-4 rounded-xl border-2 border-gold bg-white dark:bg-zinc-900 font-bold">
                <option value="MEGA">MEGA 6/45</option>
                <option value="POWER">POWER 6/55</option>
                <option value="LOTTO">LOTTO 5/35</option>
                <option value="MAX3D">MAX 3D PRO</option>
                <option value="KENO">KENO LIVE</option>
            </select>

            <div id="ballsArea" class="result-box flex flex-wrap justify-center items-center gap-2 p-4">
                <i class="fas fa-robot text-4xl opacity-20"></i>
            </div>
            
            <p id="statusMsg" class="text-center text-[10px] font-bold opacity-50 uppercase tracking-widest">Sẵn sàng dự đoán</p>

            <div class="grid grid-cols-3 gap-2">
                <select id="d" class="p-3 bg-white dark:bg-zinc-800 border rounded-lg"></select>
                <select id="m" class="p-3 bg-white dark:bg-zinc-800 border rounded-lg"></select>
                <select id="y" class="p-3 bg-white dark:bg-zinc-800 border rounded-lg"></select>
            </div>
        </div>

        <div class="pb-8 space-y-3">
            <button onclick="generate('ai')" class="w-full btn-gold py-4 text-sm">AI PHÂN TÍCH NHANH</button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="generate('dob')" class="btn-gold py-4 text-xs">SỐ NGÀY SINH</button>
                <button onclick="generate('jackpot')" class="w-full bg-red-600 text-white font-900 rounded-2xl border-2 border-black shadow-[4px_4px_0px_#000] py-4 text-xs animate-pulse">DỰ ĐOÁN JACKPOT</button>
            </div>
        </div>
    </div>

    <audio id="sfxClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sfxResult" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <script>
        // Haptic cho iOS - Phát âm thanh tần số thấp cực ngắn
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function triggerHaptic() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.value = 60;
            g.gain.setValueAtTime(0.5, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            if(navigator.vibrate) navigator.vibrate(20);
        }

        function toggleTheme() {
            triggerHaptic();
            const isDark = document.body.parentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-gold' : 'fas fa-moon';
        }

        // Init Dropdowns
        const dd=document.getElementById('d'), mm=document.getElementById('m'), yy=document.getElementById('y');
        for(let i=1;i<=31;i++) dd.innerHTML+=`<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) mm.innerHTML+=`<option value="${i}">T${i}</option>`;
        for(let i=2026;i>=1960;i--) yy.innerHTML+=`<option value="${i}">${i}</option>`;

        async function generate(mode) {
            triggerHaptic();
            document.getElementById('sfxClick').play().catch(()=>{});
            const ballsArea = document.getElementById('ballsArea');
            const status = document.getElementById('statusMsg');
            const game = document.getElementById('game').value;
            
            ballsArea.innerHTML = '<div class="animate-spin h-8 w-8 border-4 border-gold border-t-transparent rounded-full"></div>';
            status.innerText = mode === 'jackpot' ? "Đang quét dữ liệu Vietlott Jackpot..." : "AI đang tính toán...";

            setTimeout(() => {
                ballsArea.innerHTML = '';
                let count = (game === 'KENO') ? 20 : (game === 'LOTTO' ? 5 : 6);
                let max = (game === 'POWER') ? 55 : (game === 'MEGA' ? 45 : 35);
                if(game.includes('MAX')) max = 9;

                let nums = [];
                let seed = mode === 'dob' ? parseInt(dd.value + mm.value) : Math.random() * 9999;
                
                // Thuật toán Jackpot AI (Dựa trên thời gian thực và xác suất)
                const prng = () => {
                    let x = Math.sin(seed++) * 10000;
                    return x - Math.floor(x);
                };

                while(nums.length < count) {
                    let n = Math.floor(prng() * (game.includes('MAX') ? 10 : max)) + (game.includes('MAX') ? 0 : 1);
                    if(game.includes('MAX')) nums.push(n);
                    else if(!nums.includes(n)) nums.push(n);
                }
                if(!game.includes('MAX')) nums.sort((a,b)=>a-b);

                nums.forEach((n, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${game === 'KENO' ? 'w-8 h-8 text-[10px]' : ''}`;
                        b.innerText = n < 10 && !game.includes('MAX') ? '0'+n : n;
                        ballsArea.appendChild(b);
                        if(i === nums.length - 1) {
                            document.getElementById('sfxResult').play().catch(()=>{});
                            status.innerText = "HOÀN TẤT TRUY XUẤT DỮ LIỆU";
                        }
                    }, i * 120);
                });
            }, 800);
        }
    </script>
</body>
</html>
