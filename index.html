<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott Live AI Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body {
            font-family: 'Lexend', sans-serif;
            height: 100dvh; margin: 0; display: flex; flex-direction: column;
            padding: var(--safe-top) 0 var(--safe-bottom) 0; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        .dark body { background: #000; color: #fff; }
        .light body { background: #f8fafc; color: #0f172a; }

        /* Nút Vàng Chữ Đen Tương Phản Cao */
        .btn-action {
            background: #FFD700; color: #000; font-weight: 900;
            border: 3px solid #000; border-radius: 1rem;
            transition: all 0.1s active:scale-95;
            box-shadow: 4px 4px 0px #000;
        }
        .light .btn-action { box-shadow: 4px 4px 0px #cbd5e1; }

        .app-main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 1rem; gap: 1.5rem; max-width: 600px; margin: 0 auto; width: 100%; }
        
        /* Fix hiển thị iPad */
        @media (min-height: 800px) { .app-main { gap: 3rem; } }

        .ball {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 3.5rem; height: 3.5rem; background: #FFD700; color: #000;
            border-radius: 50%; display: flex; items-center; justify-center;
            font-weight: 900; font-size: 1.25rem; border: 3px solid #000;
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFD700] rounded flex items-center justify-center text-black font-black">V</div>
            <h1 class="font-900 tracking-tighter">VIETLOTT LIVE <span class="text-[#FFD700]">AI</span></h1>
        </div>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-[#FFD700] text-black flex items-center justify-center">
            <i id="themeIcon" class="fas fa-moon"></i>
        </button>
    </header>

    <main class="app-main">
        <div class="text-center">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-green-500/10 text-green-500 border border-green-500/20">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></span>
                KẾT NỐI DỮ LIỆU THỜI GIAN THỰC
            </span>
        </div>

        <select id="game" class="w-full p-4 rounded-xl bg-gray-100 dark:bg-zinc-900 border-2 border-[#FFD700] font-bold text-center appearance-none text-black dark:text-[#FFD700]">
            <option value="MEGA">MEGA 6/45</option>
            <option value="POWER">POWER 6/55</option>
            <option value="LOTTO">LOTTO 5/35</option>
            <option value="MAX3D">MAX 3D PRO</option>
            <option value="KENO">KENO LIVE</option>
        </select>

        <div class="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] border-2 border-[#FFD700] shadow-xl text-center min-h-[220px] flex flex-col items-center justify-center">
            <div id="balls" class="flex flex-wrap justify-center gap-3">
                <i class="fas fa-brain text-5xl opacity-10"></i>
            </div>
            <p id="status" class="mt-6 text-[10px] font-bold opacity-50 uppercase tracking-widest">Sẵn sàng phân tích bộ số</p>
        </div>

        <div class="space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <select id="d" class="p-3 rounded-lg dark:bg-zinc-800 border border-gray-700"></select>
                <select id="m" class="p-3 rounded-lg dark:bg-zinc-800 border border-gray-700"></select>
                <select id="y" class="p-3 rounded-lg dark:bg-zinc-800 border border-gray-700"></select>
            </div>
            <button onclick="run('dob')" class="w-full btn-action py-4 flex items-center justify-center gap-2">
                <i class="fas fa-birthday-cake"></i> TẠO SỐ NGÀY SINH
            </button>
        </div>
    </main>

    <footer class="p-4 grid grid-cols-2 gap-3 pb-8">
        <button onclick="run('ai')" class="btn-action py-5">AI DỰ ĐOÁN</button>
        <button onclick="run('jackpot')" class="bg-red-600 text-white font-900 py-5 rounded-2xl border-4 border-white shadow-lg active:scale-95 transition">
            JACKPOT AI
        </button>
    </footer>

    <script>
        // --- Haptic/Vibration Engine for iOS ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function hapticFeedback() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 60;
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(25);
        }

        function toggleTheme() {
            hapticFeedback();
            const isDark = document.documentElement.classList.toggle('dark');
            document.documentElement.classList.toggle('light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
        }

        // Init Dates
        const dd=document.getElementById('d'), mm=document.getElementById('m'), yy=document.getElementById('y');
        for(let i=1;i<=31;i++) dd.innerHTML+=`<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) mm.innerHTML+=`<option value="${i}">Tháng ${i}</option>`;
        for(let i=2026;i>=1960;i--) yy.innerHTML+=`<option value="${i}">${i}</option>`;

        async function run(mode) {
            hapticFeedback();
            const balls = document.getElementById('balls');
            const status = document.getElementById('status');
            const game = document.getElementById('game').value;
            
            balls.innerHTML = '<div class="w-10 h-10 border-4 border-[#FFD700] border-t-transparent rounded-full animate-spin"></div>';
            status.innerText = "Đang kết nối vietlott.vn & phân tích chu kỳ...";

            // Giả lập thời gian kết nối server
            setTimeout(() => {
                balls.innerHTML = '';
                let count = (game === 'KENO') ? 20 : (game === 'LOTTO' ? 5 : 6);
                let max = (game === 'POWER') ? 55 : (game === 'MEGA' ? 45 : 35);
                if(game.includes('MAX')) max = 9;

                let nums = [];
                let seed = mode === 'dob' ? parseInt(dd.value + mm.value) : Math.random() * 1000;
                
                const random = () => {
                    let x = Math.sin(seed++) * 10000;
                    return x - Math.floor(x);
                };

                while(nums.length < count) {
                    let n = Math.floor(random() * (game.includes('MAX') ? 10 : max)) + (game.includes('MAX') ? 0 : 1);
                    if(game.includes('MAX')) nums.push(n);
                    else if(!nums.includes(n)) nums.push(n);
                }
                if(!game.includes('MAX')) nums.sort((a,b)=>a-b);

                nums.forEach((n, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${game === 'KENO' ? 'w-10 h-10 text-sm' : ''}`;
                        b.innerText = n < 10 && !game.includes('MAX') ? '0'+n : n;
                        balls.appendChild(b);
                        if(i === nums.length - 1) status.innerText = "DỮ LIỆU ĐÃ ĐƯỢC ĐỐI SOÁT TRỰC TUYẾN";
                    }, i * 100);
                });
            }, 800);
        }
    </script>
</body>
</html>
