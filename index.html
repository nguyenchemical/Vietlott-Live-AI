<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vietlott AI">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>Vietlott Live AI Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#FFD700', vRed: '#d32f2f' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }

        html, body { 
            height: 100%; margin: 0; padding: 0;
            background-color: #000; overflow: hidden;
            font-family: 'Lexend', sans-serif;
        }

        /* Splash Screen - Tăng kích thước logo */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .splash-logo {
            width: 220px; height: 220px; /* Tăng kích thước lớn hơn */
            animation: pulse-gold 2s infinite ease-in-out;
            border-radius: 40px;
            object-fit: cover;
        }
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px #FFD700); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px #FFD700); }
        }

        .app-container {
            height: 100%; display: flex; flex-direction: column;
            padding: var(--safe-top) 1rem var(--safe-bottom) 1rem;
            max-width: 500px; margin: 0 auto; width: 100%; opacity: 0;
            transition: opacity 0.8s ease-in;
        }
        .app-visible { opacity: 1 !important; }

        /* Sửa màu chữ Dropdown ở Dark Mode */
        .dark select { color: #ffffff !important; background-color: #18181b !important; }
        .light select { color: #000000 !important; background-color: #ffffff !important; }

        .btn-gold {
            background-color: #FFD700; color: #000; font-weight: 900;
            border: 2px solid #000; box-shadow: 4px 4px 0px #000;
        }

        .result-box {
            flex: 1; margin: 1rem 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 2.5rem;
            border: 2px solid rgba(156, 163, 175, 0.2);
            background: rgba(255, 255, 255, 0.05);
            position: relative; overflow: hidden;
        }
        
        /* Logo trong khung kết quả vừa vặn */
        .bg-logo-fit {
            position: absolute; width: 80%; height: 80%;
            object-fit: contain; opacity: 0.15; z-index: 0;
            pointer-events: none;
        }

        .ball {
            animation: ball-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 3.5rem; height: 3.5rem; background: #FFD700; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.3rem; border: 2px solid #000; z-index: 1;
        }
        @keyframes ball-in { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        select { -webkit-appearance: none; border: 1px solid rgba(156,163,175,0.3); outline: none; }
    </style>
</head>
<body class="dark:text-white text-slate-900">

    <div id="splash">
        <img src="icon.png" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2313/2313982.png'">
        <h2 class="text-gold mt-8 font-black text-3xl tracking-widest animate-pulse">VIETLOTT AI</h2>
    </div>

    <div id="appBody" class="app-container">
        <header class="py-4 flex justify-between items-center border-b border-gray-500/20">
            <div class="flex items-center gap-2">
                <span class="text-vRed font-900 text-3xl tracking-tighter italic">LIVE</span>
                <h1 class="font-900 text-lg uppercase dark:text-white text-slate-900">AI Ultimate</h1>
            </div>
            <button onclick="toggleTheme()" class="w-12 h-12 rounded-2xl bg-[#FFD700] flex items-center justify-center shadow-lg">
                <i id="themeIcon" class="fas fa-moon text-black text-xl"></i>
            </button>
        </header>

        <div class="mt-6">
            <select id="gameSelect" class="w-full p-5 rounded-2xl border-4 border-gold font-900 text-center text-xl shadow-xl">
                <option value="MEGA">MEGA 6/45</option>
                <option value="POWER">POWER 6/55</option>
                <option value="LOTTO">LOTTO 5/35</option>
                <option value="MAX3D">MAX 3D PRO</option>
                <option value="KENO">KENO LIVE</option>
            </select>
        </div>

        <div class="result-box text-center p-6">
            <img src="icon.png" class="bg-logo-fit" onerror="this.style.display='none'">
            <div id="ballField" class="flex flex-wrap justify-center gap-3 relative z-10">
                </div>
            <p id="statusMsg" class="mt-6 text-[10px] font-bold uppercase tracking-[0.3em] opacity-50 z-10">Hệ thống phân tích trực tuyến</p>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <select id="day" class="p-4 rounded-xl font-bold text-center border-none shadow-md"></select>
            <select id="month" class="p-4 rounded-xl font-bold text-center border-none shadow-md"></select>
            <select id="year" class="p-4 rounded-xl font-bold text-center border-none shadow-md"></select>
        </div>

        <div class="space-y-4 my-6">
            <button onclick="handleAction('ai')" class="w-full btn-gold py-6 rounded-3xl text-2xl tracking-tighter">AI PHÂN TÍCH</button>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleAction('dob')" class="bg-gray-200 dark:bg-zinc-800 dark:text-white text-black font-900 py-5 rounded-2xl text-sm border-b-4 border-gray-400 dark:border-zinc-700 active:border-b-0">NGÀY SINH</button>
                <button onclick="handleAction('jackpot')" class="bg-vRed text-white font-900 py-5 rounded-2xl shadow-xl border-b-4 border-red-800 active:border-b-0">JACKPOT AI</button>
            </div>
        </div>
    </div>

    <audio id="successSfx" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="clickSfx" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                document.getElementById('appBody').classList.add('app-visible');
                setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 800);
            }, 2500);
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function triggerHaptic() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 60;
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(40);
            document.getElementById('clickSfx').play().catch(() => {});
        }

        function toggleTheme() {
            triggerHaptic();
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-moon text-black' : 'fas fa-sun text-black';
        }

        const dS=document.getElementById('day'), mS=document.getElementById('month'), yS=document.getElementById('year');
        for(let i=1;i<=31;i++) dS.innerHTML+=`<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) mS.innerHTML+=`<option value="${i}">Tháng ${i}</option>`;
        for(let i=2026;i>=1960;i--) yS.innerHTML+=`<option value="${i}">${i}</option>`;

        function handleAction(mode) {
            triggerHaptic();
            const field = document.getElementById('ballField');
            const status = document.getElementById('statusMsg');
            const game = document.getElementById('gameSelect').value;
            
            field.innerHTML = '<div class="w-16 h-16 border-8 border-gold border-t-transparent rounded-full animate-spin"></div>';
            status.innerText = "Đang kết nối vietlott.vn...";
            
            setTimeout(() => {
                field.innerHTML = '';
                let count = (game === 'KENO') ? 20 : (game === 'LOTTO' ? 5 : 6);
                let max = (game === 'POWER') ? 55 : (game === 'MEGA' ? 45 : 35);
                let nums = [];
                let seed = mode === 'dob' ? parseInt(dS.value + mS.value) : Math.random() * 1000;
                const random = () => { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); };

                while(nums.length < count) {
                    let n = Math.floor(random() * max) + 1;
                    if(!nums.includes(n)) nums.push(n);
                }
                
                nums.sort((a,b)=>a-b).forEach((n, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${game === 'KENO' ? 'w-10 h-10 text-sm' : ''}`;
                        b.innerText = n < 10 ? '0'+n : n;
                        field.appendChild(b);
                        if(i === nums.length - 1) {
                            status.innerText = "PHÂN TÍCH HOÀN TẤT";
                            document.getElementById('successSfx').play().catch(() => {}); // Chạy âm thanh thành công
                        }
                    }, i * 150);
                });
            }, 1200);
        }
    </script>
</body>
</html>
